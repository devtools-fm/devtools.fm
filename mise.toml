[tools]
node = "24"
pnpm = "10.14.0"

[settings]
experimental = true

[env]
_.path = "node_modules/.bin"
_.file = ".env"

[hooks]
postinstall = ["pnpm install", "node scripts/sync-pnpm-version.js"]

[tasks.dev]
run = "next dev"
description = "Run Next.js development server"

[tasks.setup-for-ci]
run = "git remote add origin https://github.com/devtools-fm/devtools.fm.git && git pull origin main --unshallow"
description = "Setup repository for CI"

[tasks.build]
run = "mise run setup-for-ci && mise run standard-site-prepare-content && next build && mise run build-rss"
description = "Build the application"

[tasks.build-rss]
run = "node -r esbuild-register utils/generate-rss.ts"
description = "Generate RSS feed"

[tasks.start]
run = "next start"
description = "Start production server"

[tasks.create-new-episode]
run = "node -r esbuild-register scripts/create-new-episode.ts"
description = "Create a new episode"

[tasks.standard-site-prepare-content]
run = "node -r esbuild-register scripts/generate-standard-site-content.ts"
description = "Generate Sequoia-ready episode markdown"

[tasks.sync-markpub-content]
run = "node -r esbuild-register scripts/sync-markpub-content.ts"
description = "Sync at.markpub.markdown content to published records"

[tasks.generate-episode-descriptions]
run = "node -r esbuild-register scripts/generate-episode-descriptions.ts"
description = "Generate one-line episode descriptions with Cursor Agent CLI"

[tasks.publish-dry]
run = "mise run standard-site-prepare-content && sequoia publish --dry-run && mise run sync-markpub-content -- --dry-run"
description = "Preview Standard.site and Markpub publishing"

[tasks.publish]
run = "mise run standard-site-prepare-content && sequoia publish && mise run sync-markpub-content"
description = "Publish episodes to Standard.site and sync Markpub content"
